<!DOCTYPE html>

        .material-symbols-outlined {

            -webkit-backdrop-filter: blur(12px);
        }
    </style>

<body class="bg-surface font-body text-on-surface antialiased">
<!-- TopAppBar Shell -->
<nav class="fixed top-0 w-full z-50 bg-[#f7f9fb]/80 backdrop-blur-xl flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-[#464555] hover:bg-[#e6e8ea]/50 p-2 rounded-xl transition-colors">arrow_back</button>
<h1 class="font-headline font-bold text-lg tracking-tight text-[#191c1e]">Settings</h1>

<div class="flex items-center gap-2">
<button class="material-symbols-outlined text-[#464555] hover:bg-[#e6e8ea]/50 p-2 rounded-xl transition-colors">more_vert</button>
</div>
</nav>

<header class="flex flex-col items-center text-center space-y-4 mb-12">
<div class="relative">
<div class="w-24 h-24 rounded-full overflow-hidden ring-4 ring-white shadow-xl">

</div>
<div class="absolute bottom-0 right-0 w-6 h-6 bg-emerald-500 border-4 border-surface rounded-full"></div>
</div>
<div class="space-y-1">
<h2 class="font-headline text-2xl font-bold tracking-tight text-on-surface">Alex Rivers</h2>
<p class="text-sm font-medium text-[#464555] tracking-widest uppercase opacity-70">The Architect</p>
<p class="text-xs text-primary font-semibold px-3 py-1 bg-primary/10 rounded-full inline-block">Online • Premium Member</p>
</div>
</header>
<!-- Foldable Accordion Sections -->
<div class="space-y-4">
<!-- AI Infrastructure Section -->
<section class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm group">
<button class="w-full flex items-center justify-between p-5 text-left transition-colors hover:bg-surface-container-low">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-xl bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">memory</span>
</div>
<div>
<p class="font-headline font-semibold text-on-surface">AI Infrastructure</p>
<p class="text-xs text-on-surface-variant">Neural engine &amp; compute resources</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant transition-transform">expand_more</span>
</button>
</section>
<!-- Appearance Section (Expanded by Default for Task requirement) -->
<section class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-[0_12px_40px_rgba(25,28,30,0.04)] border border-[#E2E8F0]">

<div class="w-10 h-10 rounded-xl bg-indigo-500 flex items-center justify-center text-white">
<span class="material-symbols-outlined">palette</span>
</div>
<div>
<p class="font-headline font-semibold text-on-surface">Appearance</p>
<p class="text-xs text-on-surface-variant">Visual styles &amp; workspace layout</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant transform rotate-180">expand_more</span>
</button>
<div class="p-6 space-y-8">

<div>
<p class="font-medium text-on-surface">Visual Theme</p>
<p class="text-sm text-on-surface-variant">Adjust interface brightness</p>
</div>
<div class="flex p-1 bg-surface-container rounded-full">
<button class="flex items-center gap-2 px-4 py-1.5 rounded-full bg-white text-primary shadow-sm font-medium text-sm">
<span class="material-symbols-outlined text-[18px]">light_mode</span>
                                Light
                            </button>
<button class="flex items-center gap-2 px-4 py-1.5 rounded-full text-on-surface-variant hover:text-on-surface font-medium text-sm transition-colors">
<span class="material-symbols-outlined text-[18px]">dark_mode</span>
                                Dark
                            </button>
</div>
</div>
<!-- Glassmorphism Slider -->
<div class="space-y-4">
<div class="flex justify-between items-end">
<div>
<p class="font-medium text-on-surface">Glassmorphism Depth</p>
<p class="text-sm text-on-surface-variant">Control background blur intensity</p>
</div>
<span class="text-primary font-bold font-headline">75%</span>
</div>
<div class="relative h-12 flex items-center">
<div class="absolute w-full h-1.5 bg-surface-container rounded-full overflow-hidden">
<div class="w-3/4 h-full bg-gradient-to-r from-primary to-primary-container"></div>
</div>
<div class="absolute left-3/4 -ml-3 w-6 h-6 bg-white border-4 border-primary rounded-full shadow-lg cursor-pointer"></div>
</div>
<div class="p-4 rounded-xl glass-panel border border-white/40 shadow-inner flex items-center justify-center">
<p class="text-xs font-medium text-on-surface/60 italic tracking-wide">Live Preview: Subsurface Scattering Effect</p>
</div>
</div>
</div>
</section>
<!-- Community Workshop Section -->
<section class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm">
<button class="w-full flex items-center justify-between p-5 text-left transition-colors hover:bg-surface-container-low">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-xl bg-amber-500/10 flex items-center justify-center text-amber-600">
<span class="material-symbols-outlined">hub</span>
</div>
<div>
<p class="font-headline font-semibold text-on-surface">Community Workshop</p>
<p class="text-xs text-on-surface-variant">Manage shared models &amp; datasets</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant">expand_more</span>
</button>
</section>
<!-- Account & Privacy Section -->
<section class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm">
<button class="w-full flex items-center justify-between p-5 text-left transition-colors hover:bg-surface-container-low">
<div class="flex items-center gap-4">

<span class="material-symbols-outlined">security</span>

<button class="w-full py-4 bg-surface-container-highest text-on-surface font-semibold rounded-xl hover:bg-surface-dim transition-all">

<span class="material-symbols-outlined">call</span>

<a class="flex flex-col items-center justify-center text-[#464555] opacity-60 hover:opacity-100 transition-opacity" href="#">

<a class="flex flex-col items-center justify-center text-[#4F46E5] bg-[#4F46E5]/10 rounded-xl px-4 py-1" href="#">

<span class="font-['Inter'] text-[11px] font-medium tracking-wide">Settings</span>
</a>

<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-30">

<div class="absolute bottom-[20%] right-[10%] w-[500px] h-[500px] bg-secondary/5 rounded-full blur-[120px]"></div>
