name: Android Tag Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: android-tag-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Validate tag and derive release metadata
        id: version
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME}"
          if [[ ! "$tag_name" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::Unsupported Android release tag '$tag_name'. Expected format: vMAJOR.MINOR.PATCH"
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"

          version_name="${major}.${minor}.${patch}"
          version_code="$((10#$major * 1000000 + 10#$minor * 1000 + 10#$patch))"
          asset_name="gkim-android-${tag_name}.apk"

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "asset_name=$asset_name" >> "$GITHUB_OUTPUT"

      - name: Inspect Android release signing secrets
        id: signing
        shell: bash
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          required_vars=(
            ANDROID_RELEASE_KEYSTORE_BASE64
            ANDROID_RELEASE_STORE_PASSWORD
            ANDROID_RELEASE_KEY_ALIAS
            ANDROID_RELEASE_KEY_PASSWORD
          )

          configured_count=0
          for var_name in "${required_vars[@]}"; do
            if [[ -n "${!var_name:-}" ]]; then
              configured_count=$((configured_count + 1))
            fi
          done

          if [[ "$configured_count" -eq 0 ]]; then
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$configured_count" -ne "${#required_vars[@]}" ]]; then
            echo "::error::Android release signing secrets are partially configured. Supply all required ANDROID_RELEASE_* secrets."
            exit 1
          fi

          keystore_path="$RUNNER_TEMP/gkim-release.keystore"
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"

          if [[ ! -s "$keystore_path" ]]; then
            echo "::error::Decoded keystore is empty. Check ANDROID_RELEASE_KEYSTORE_BASE64."
            exit 1
          fi

          echo "has_signing=true" >> "$GITHUB_OUTPUT"
          echo "keystore_path=$keystore_path" >> "$GITHUB_OUTPUT"

      - name: Initialize Android release summary
        shell: bash
        run: |
          {
            echo "## Android release context"
            echo ""
            echo "- Tag: \`${{ steps.version.outputs.tag_name }}\`"
            echo "- Expected APK asset: \`${{ steps.version.outputs.asset_name }}\`"
            echo "- Repository: \`${{ github.repository }}\`"
            echo "- Signing secrets configured: \`${{ steps.signing.outputs.has_signing }}\`"
            echo "- Release page: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag_name }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Make Gradle wrapper executable
        shell: bash
        run: chmod +x android/gradlew

      - name: Run lightweight Android release gate
        working-directory: android
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --stacktrace :app:testDebugUnitTest

      - name: Build signed Android release APK
        id: build
        working-directory: android
        shell: bash
        env:
          GKIM_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          GKIM_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          GKIM_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          gradle_args=(
            --no-daemon
            --stacktrace
            :app:assembleRelease
            -PGKIM_RELEASE_VERSION_NAME=${{ steps.version.outputs.version_name }}
            -PGKIM_RELEASE_VERSION_CODE=${{ steps.version.outputs.version_code }}
          )

          if [[ "${{ steps.signing.outputs.has_signing }}" == "true" ]]; then
            gradle_args+=(
              -PGKIM_RELEASE_STORE_FILE=${{ steps.signing.outputs.keystore_path }}
              -PGKIM_RELEASE_STORE_PASSWORD=$GKIM_RELEASE_STORE_PASSWORD
              -PGKIM_RELEASE_KEY_ALIAS=$GKIM_RELEASE_KEY_ALIAS
              -PGKIM_RELEASE_KEY_PASSWORD=$GKIM_RELEASE_KEY_PASSWORD
            )
          else
            echo "::warning::ANDROID_RELEASE_* secrets are not configured. Running unsigned release build for compilation validation only."
          fi

          ./gradlew "${gradle_args[@]}"

          raw_apk_path="$(find "$PWD/app/build/outputs/apk/release" -maxdepth 1 -type f -name '*.apk' | head -n 1)"
          if [[ -z "$raw_apk_path" || ! -f "$raw_apk_path" ]]; then
            echo "::error::Expected a release APK under $PWD/app/build/outputs/apk/release, but none was found."
            exit 1
          fi

          release_apk_path="$RUNNER_TEMP/${{ steps.version.outputs.asset_name }}"
          cp "$raw_apk_path" "$release_apk_path"

          echo "apk_path=$release_apk_path" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        id: upload_artifact
        if: ${{ steps.signing.outputs.has_signing == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ steps.version.outputs.tag_name }}
          path: ${{ steps.build.outputs.apk_path }}
          if-no-files-found: error

      - name: Publish APK to GitHub Release
        id: publish_release
        if: ${{ steps.signing.outputs.has_signing == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: Android ${{ steps.version.outputs.tag_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.build.outputs.apk_path }}

      - name: Verify published GitHub Release asset
        id: verify_release
        if: ${{ steps.signing.outputs.has_signing == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag_name="${{ steps.version.outputs.tag_name }}"
          asset_name="${{ steps.version.outputs.asset_name }}"
          repo="${{ github.repository }}"
          release_url="https://github.com/${repo}/releases/tag/${tag_name}"

          for attempt in {1..12}; do
            asset_match="$(gh release view "$tag_name" --repo "$repo" --json url,assets --jq ".assets[] | select(.name == \"$asset_name\") | .name" 2>/dev/null || true)"
            if [[ -n "$asset_match" ]]; then
              release_url="$(gh release view "$tag_name" --repo "$repo" --json url --jq '.url')"
              echo "release_asset_verified=true" >> "$GITHUB_OUTPUT"
              echo "release_url=$release_url" >> "$GITHUB_OUTPUT"
              echo "release_asset_name=$asset_match" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            sleep 5
          done

          echo "::error::Published release asset '$asset_name' was not found on GitHub Release '$tag_name' after waiting for publication."
          exit 1

      - name: Fail cleanly when release signing secrets are missing
        id: missing_signing
        if: ${{ steps.signing.outputs.has_signing != 'true' }}
        shell: bash
        run: |
          echo "::error::Missing ANDROID_RELEASE_* secrets. The APK compiled successfully, but publication is blocked until signing secrets are configured."
          exit 1

      - name: Summarize Android release outcome
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo ""
            echo "## Android release outcome"
            echo ""
            echo "- Tag: \`${{ steps.version.outputs.tag_name }}\`"
            echo "- Expected APK asset: \`${{ steps.version.outputs.asset_name }}\`"
            echo "- Build step: \`${{ steps.build.outcome }}\`"
            echo "- Workflow artifact upload: \`${{ steps.upload_artifact.outcome }}\`"
            echo "- GitHub Release publish: \`${{ steps.publish_release.outcome }}\`"

            if [[ "${{ steps.verify_release.outputs.release_asset_verified }}" == "true" ]]; then
              echo "- Publication state: verified GitHub Release asset \`${{ steps.verify_release.outputs.release_asset_name }}\`"
              echo "- Release URL: ${{ steps.verify_release.outputs.release_url }}"
            elif [[ "${{ steps.signing.outputs.has_signing }}" != "true" ]]; then
              echo "- Publication state: blocked because the required ANDROID_RELEASE_* secrets are missing or incomplete."
            elif [[ "${{ steps.publish_release.outcome }}" == "failure" ]]; then
              echo "- Publication state: GitHub Release publication failed before the final APK asset could be verified."
            else
              echo "- Publication state: the workflow did not confirm that \`${{ steps.version.outputs.asset_name }}\` is present on the GitHub Release."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
