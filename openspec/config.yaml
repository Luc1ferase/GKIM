schema: spec-driven

context: |
  Every implementation task must pause for verification, review, scoring, evidence recording, and GitHub push before the next task begins.
  Use docs/DELIVERY_WORKFLOW.md as the standard format for accepted-task evidence.

rules:
  tasks:
    - Break tasks into chunks small enough to implement, review, score, and push in one focused session.
    - Each task must have a clear verification outcome and an obvious completion point.

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours
